<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Research Ledger — Stock Diligence Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF0E3;
    --paper-deep:#E6E9D8;
    --rule:#B9C7AE;
    --rule-strong:#8CA084;
    --ink:#1C2B3A;
    --ink-soft:#4B5A6B;
    --forest:#2B5D45;
    --forest-deep:#1E4432;
    --gold:#A8842E;
    --gold-bright:#C79A2E;
    --red:#9C3B30;
    --card:#FBFAF2;
    --navy:#16212B;
    --navy-soft:#22323F;
    --shadow: 0 1px 0 rgba(28,43,58,.06), 0 8px 24px -12px rgba(28,43,58,.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(180deg, transparent 0 27px, var(--rule) 27px 28px),
      var(--paper);
    color:var(--ink);
    font-family:'Spectral', Georgia, serif;
    min-height:100vh;
    padding:28px 18px 80px;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  a{color:inherit;}

  /* ===== Masthead ===== */
  .masthead{
    max-width:1180px;
    margin:0 auto 22px;
    background:var(--navy);
    color:#EFEEDF;
    border-radius:4px;
    padding:22px 28px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:20px;
    flex-wrap:wrap;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .masthead::before{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(90deg, rgba(43,93,69,.35), transparent 40%),
      linear-gradient(270deg, rgba(167,132,46,.18), transparent 45%);
    pointer-events:none;
  }
  .masthead h1{
    font-size:29px;
    margin:0 0 4px;
    letter-spacing:.3px;
    font-weight:600;
    position:relative;
  }
  .masthead .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#A9C2AE;
    position:relative;
  }
  .record-no{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:#B7C4CC;
    text-align:right;
    position:relative;
    line-height:1.6;
  }
  .record-no b{color:#EFEEDF; letter-spacing:1px;}

  /* ===== Cover: ticker + thesis ===== */
  .cover{
    max-width:1180px;
    margin:0 auto 22px;
    background:var(--card);
    border:1px solid var(--rule-strong);
    border-radius:4px;
    box-shadow:var(--shadow);
    padding:22px 26px;
    position:relative;
  }
  .cover::before{
    content:"";
    position:absolute; top:6px; left:6px; right:6px; bottom:6px;
    border:1px solid var(--rule);
    border-radius:2px;
    pointer-events:none;
  }
  .cover-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
  }
  @media (max-width:820px){ .cover-grid{grid-template-columns:1fr;} }
  label.field-label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  input[type=text].ticker-input, input[type=text].name-input{
    width:100%;
    font-family:'IBM Plex Mono', monospace;
    font-size:20px;
    font-weight:600;
    border:none;
    border-bottom:2px solid var(--rule-strong);
    background:transparent;
    padding:4px 2px 8px;
    color:var(--forest-deep);
    letter-spacing:1px;
  }
  input.name-input{font-family:'Spectral',serif; font-size:17px; font-weight:500; color:var(--ink); letter-spacing:0;}
  input:focus, textarea:focus, select:focus{outline:2px solid var(--gold); outline-offset:2px;}
  textarea.thesis{
    width:100%;
    min-height:78px;
    font-family:'Spectral', serif;
    font-size:15px;
    line-height:1.55;
    border:none;
    border-bottom:2px solid var(--rule-strong);
    background:transparent;
    resize:vertical;
    color:var(--ink);
    padding:4px 2px 8px;
  }
  .cover-note{
    grid-column:1 / -1;
    margin-top:4px;
  }

  /* ===== Layout: sections + summary rail ===== */
  .desk{
    max-width:1180px;
    margin:0 auto;
    display:grid;
    grid-template-columns:1fr 300px;
    gap:22px;
    align-items:start;
  }
  @media (max-width:900px){ .desk{grid-template-columns:1fr;} }

  .sections{display:flex; flex-direction:column; gap:16px;}

  .section-page{
    background:var(--card);
    border:1px solid var(--rule-strong);
    border-radius:4px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    cursor:pointer;
    background:linear-gradient(180deg, rgba(43,93,69,.05), transparent);
    border-bottom:1px solid var(--rule);
  }
  .section-head:hover{background:linear-gradient(180deg, rgba(43,93,69,.09), transparent);}
  .section-title{display:flex; align-items:baseline; gap:12px;}
  .section-title .num{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); letter-spacing:1px;}
  .section-title h2{font-size:18px; margin:0; font-weight:600;}
  .section-title .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px; letter-spacing:1px; text-transform:uppercase;
    color:var(--ink-soft); border:1px solid var(--rule-strong); border-radius:20px;
    padding:2px 8px; margin-left:4px;
  }
  .section-meta{display:flex; align-items:center; gap:14px;}
  .section-score{font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600;}
  .chev{transition:transform .25s ease; color:var(--ink-soft); font-size:13px;}
  .section-page.collapsed .chev{transform:rotate(-90deg);}
  .section-body{padding:6px 20px 18px;}
  .section-page.collapsed .section-body{display:none;}
  .section-help{font-size:12.5px; color:var(--ink-soft); margin:2px 0 12px; font-style:italic;}

  .item-row{
    display:grid;
    grid-template-columns:auto 1fr auto auto;
    gap:10px;
    align-items:start;
    padding:9px 0;
    border-bottom:1px dashed var(--rule);
  }
  .item-row:last-child{border-bottom:none;}
  .item-row.flag-row .item-label-input{color:var(--red);}
  .chk{
    width:19px; height:19px; margin-top:3px;
    accent-color:var(--forest);
    cursor:pointer;
  }
  .flag-row .chk{accent-color:var(--red);}
  .item-main{display:flex; flex-direction:column; gap:5px;}
  .item-label-input{
    font-family:'Spectral', serif;
    font-size:14.5px;
    border:none;
    background:transparent;
    color:var(--ink);
    padding:2px 0;
    width:100%;
    border-bottom:1px solid transparent;
  }
  .item-label-input:hover, .item-label-input:focus{border-bottom:1px solid var(--rule-strong);}
  .item-note-input{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    border:none;
    background:transparent;
    padding:1px 0;
    width:100%;
  }
  .item-note-input::placeholder{color:#9BAAB4;}
  select.level-select{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.5px;
    border:1px solid var(--rule-strong);
    border-radius:3px;
    padding:4px 6px;
    background:var(--paper);
    color:var(--ink);
    height:fit-content;
    margin-top:1px;
  }
  select.level-select[data-level="low"]{border-color:var(--forest); color:var(--forest-deep);}
  select.level-select[data-level="medium"]{border-color:var(--gold); color:#7A5F1E;}
  select.level-select[data-level="high"]{border-color:var(--red); color:var(--red);}
  .del-btn{
    background:none; border:none; color:var(--ink-soft);
    font-size:15px; cursor:pointer; padding:2px 6px; margin-top:2px;
    opacity:.45; transition:opacity .15s;
  }
  .del-btn:hover{opacity:1; color:var(--red);}
  .add-row{
    margin-top:10px;
    background:none;
    border:1px dashed var(--rule-strong);
    border-radius:3px;
    color:var(--forest-deep);
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    padding:7px 12px;
    cursor:pointer;
    letter-spacing:.5px;
  }
  .add-row:hover{background:rgba(43,93,69,.07);}

  /* ===== Summary rail ===== */
  .rail{position:sticky; top:18px; display:flex; flex-direction:column; gap:16px;}
  .verdict-card{
    background:var(--card);
    border:1px solid var(--rule-strong);
    border-radius:4px;
    box-shadow:var(--shadow);
    padding:20px;
    text-align:center;
  }
  .verdict-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft);
    margin-bottom:10px;
  }
  .stamp-wrap{display:flex; justify-content:center; margin:6px 0 12px;}
  .stamp{
    width:150px; height:150px;
    transform:rotate(-8deg) scale(.9);
    opacity:0;
    transition:transform .5s cubic-bezier(.2,1.6,.4,1), opacity .35s ease;
  }
  .stamp.show{transform:rotate(-8deg) scale(1); opacity:1;}
  .overall-score{
    font-family:'IBM Plex Mono',monospace;
    font-size:34px; font-weight:700; color:var(--forest-deep);
    letter-spacing:1px;
  }
  .overall-score span{font-size:15px; color:var(--ink-soft);}
  .bars{display:flex; flex-direction:column; gap:9px; margin-top:6px;}
  .bar-row{text-align:left;}
  .bar-label{
    display:flex; justify-content:space-between;
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft);
    margin-bottom:3px;
  }
  .bar-track{height:6px; background:var(--rule); border-radius:3px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--forest); border-radius:3px; transition:width .4s ease;}
  .bar-fill.warn{background:var(--gold-bright);}
  .bar-fill.danger{background:var(--red);}

  .actions-card{
    background:var(--card);
    border:1px solid var(--rule-strong);
    border-radius:4px;
    box-shadow:var(--shadow);
    padding:16px;
    display:flex; flex-direction:column; gap:8px;
  }
  .actions-card h3{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--ink-soft); margin:0 0 4px;
  }
  .desk-btn{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px;
    border:1px solid var(--rule-strong); background:var(--paper);
    color:var(--ink); border-radius:3px; padding:9px 10px; cursor:pointer;
    text-align:left; letter-spacing:.3px;
  }
  .desk-btn:hover{background:var(--paper-deep); border-color:var(--forest);}
  .desk-btn.primary{background:var(--forest-deep); color:#EFEEDF; border-color:var(--forest-deep);}
  .desk-btn.primary:hover{background:var(--forest);}
  #import-input{display:none;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--navy); color:#EFEEDF; font-family:'IBM Plex Mono',monospace;
    font-size:12px; padding:10px 18px; border-radius:4px; opacity:0;
    transition:opacity .25s ease, transform .25s ease; pointer-events:none;
    letter-spacing:.5px; z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ===== Journal (blog drafts) ===== */
  .journal{max-width:1180px; margin:0 auto 22px;}
  .journal-intro{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:2px;
    text-transform:uppercase; color:var(--ink-soft); margin-bottom:8px;
  }
  .journal-tabsbar{
    display:flex; align-items:flex-end; gap:4px; overflow-x:auto;
    padding-top:6px;
  }
  .j-tab{
    background:var(--paper-deep);
    border:1px solid var(--rule-strong);
    border-bottom:none;
    border-radius:7px 7px 0 0;
    padding:8px 6px 7px 12px;
    display:flex; align-items:center; gap:6px;
    cursor:pointer;
    position:relative; top:1px;
    max-width:190px;
    flex:0 0 auto;
  }
  .j-tab.active{
    background:var(--card);
    border-color:var(--forest);
    z-index:2;
    box-shadow:0 -2px 0 var(--gold-bright) inset;
  }
  .j-tab:not(.active):hover{background:#DEE3D0;}
  .tab-name-input{
    border:none; background:transparent;
    font-family:'IBM Plex Mono', monospace; font-size:11.5px;
    color:var(--ink); width:110px;
    padding:2px 0;
  }
  .j-tab.active .tab-name-input{color:var(--forest-deep); font-weight:600;}
  .tab-close{
    background:none; border:none; color:var(--ink-soft); opacity:.4;
    font-size:12px; cursor:pointer; padding:0 2px; line-height:1;
  }
  .tab-close:hover{opacity:1; color:var(--red);}
  .add-tab-btn{
    flex:0 0 auto;
    align-self:center;
    background:none; border:1px dashed var(--rule-strong); border-radius:6px;
    color:var(--forest-deep); font-family:'IBM Plex Mono', monospace; font-size:12px;
    padding:7px 12px; cursor:pointer; margin-left:2px; margin-bottom:2px;
    white-space:nowrap;
  }
  .add-tab-btn:hover{background:rgba(43,93,69,.08);}
  .journal-card{
    background:var(--card);
    border:1px solid var(--forest);
    border-radius:0 4px 4px 4px;
    box-shadow:var(--shadow);
    padding:22px 26px 18px;
  }
  .entry-title-input{
    width:100%; border:none; background:transparent;
    font-family:'Spectral', serif; font-size:24px; font-weight:600;
    color:var(--ink); border-bottom:2px solid var(--rule-strong);
    padding:2px 2px 10px; margin-bottom:14px;
  }
  .entry-body-input{
    width:100%; min-height:340px; border:none; background:transparent;
    font-family:'Spectral', serif; font-size:15.5px; line-height:1.75;
    color:var(--ink); resize:vertical;
  }
  .entry-footer{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:10px; padding-top:10px; border-top:1px dashed var(--rule);
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--ink-soft);
  }
  .entry-footer button{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px;
    background:none; border:1px solid var(--rule-strong); border-radius:3px;
    color:var(--ink-soft); padding:4px 9px; cursor:pointer;
  }
  .entry-footer button:hover{border-color:var(--red); color:var(--red);}

  @media print{
    body{background:var(--paper); padding:0;}
    .actions-card, .add-row, .del-btn, #import-input, .journal{display:none !important;}
    .desk{grid-template-columns:1fr 260px;}
    .section-page{break-inside:avoid;}
  }
</style>
</head>
<body>

  <div class="masthead">
    <div>
      <h1>The Research Ledger</h1>
      <div class="sub">Equity Diligence &amp; Conviction Desk</div>
    </div>
    <div class="record-no">
      FILE NO. <b id="record-no">—</b><br>
      OPENED <b id="record-date">—</b>
    </div>
  </div>

  <div class="journal">
    <div class="journal-intro">The Journal — write-ups &amp; blog drafts</div>
    <div class="journal-tabsbar" id="journal-tabsbar"></div>
    <div class="journal-card">
      <input type="text" id="entry-title" class="entry-title-input" placeholder="Entry title...">
      <textarea id="entry-body" class="entry-body-input" placeholder="Write your take here — the thesis writeup, a blog post, notes for later..."></textarea>
      <div class="entry-footer">
        <span id="entry-wordcount">0 words</span>
        <button id="entry-delete">delete this entry</button>
      </div>
    </div>
  </div>

  <div class="cover">
    <div class="cover-grid">
      <div>
        <label class="field-label" for="ticker">Ticker / Symbol</label>
        <input type="text" id="ticker" class="ticker-input" placeholder="e.g. TCS, INFY, AAPL" autocomplete="off">
      </div>
      <div>
        <label class="field-label" for="company">Company Name</label>
        <input type="text" id="company" class="name-input" placeholder="Full company name" autocomplete="off">
      </div>
      <div class="cover-note">
        <label class="field-label" for="thesis">The Idea — why this, why now (one paragraph)</label>
        <textarea id="thesis" class="thesis" placeholder="Type the investment idea here — the business, the trigger, the edge you think you have..."></textarea>
      </div>
    </div>
  </div>

  <div class="desk">
    <div class="sections" id="sections"></div>

    <div class="rail">
      <div class="verdict-card">
        <div class="verdict-label">Conviction Reading</div>
        <div class="overall-score"><span id="overall-pct">0</span><span>%</span></div>
        <div class="stamp-wrap"><div class="stamp" id="stamp"></div></div>
        <div class="bars" id="bars"></div>
      </div>
      <div class="actions-card">
        <h3>Ledger Actions</h3>
        <button class="desk-btn primary" id="btn-export">⬇ Export research (.json)</button>
        <button class="desk-btn" id="btn-import">⬆ Import saved research</button>
        <input type="file" id="import-input" accept="application/json">
        <button class="desk-btn" id="btn-copy">⎘ Copy summary as text</button>
        <button class="desk-btn" id="btn-print">🖨 Print / save as PDF</button>
        <button class="desk-btn" id="btn-reset" style="color:var(--red); border-color:var(--red);">↺ Clear this ledger</button>
      </div>
    </div>
  </div>


  <div class="toast" id="toast"></div>

<script>
/* ---------- State ---------- */
function uid(){ return Math.random().toString(36).slice(2,9); }

function checkItem(label){ return {id:uid(), label, checked:false, note:''}; }
function flagItem(label){ return {id:uid(), label, checked:false, note:''}; }
function forceItem(label){ return {id:uid(), label, level:'medium', note:''}; }

const state = {
  ticker:'', company:'', thesis:'',
  journal:{
    activeId: 'entry-1',
    entries:[
      {id:'entry-1', name:'Entry 1', title:'', body:''}
    ]
  },
  sections:[
    {
      id:'business', kind:'check', title:'Business &amp; Moat',
      help:'Qualitative read on how the business actually makes money and defends it.',
      items:[
        checkItem('Can explain how the company makes money in one plain sentence'),
        checkItem('Revenue is not overly concentrated in one customer, product, or region'),
        checkItem('A durable advantage is identifiable — brand, network effect, cost edge, switching cost, or patents'),
        checkItem('Clear runway to reinvest capital at good returns for years, not quarters'),
        checkItem('Founders / management hold meaningful skin in the game'),
      ]
    },
    {
      id:'porter', kind:'force', title:"Porter's Five Forces",
      help:'Rate the intensity of each competitive force. Low intensity is good for pricing power; High is a warning.',
      items:[
        forceItem('Threat of new entrants — capital, regulatory, brand or licensing barriers to entry'),
        forceItem('Bargaining power of suppliers — supplier concentration, switching cost, input scarcity'),
        forceItem('Bargaining power of buyers — customer concentration, price sensitivity, ease of comparison'),
        forceItem('Threat of substitutes — alternative products, technologies, or business models'),
        forceItem('Rivalry among existing competitors — number of players, price wars, differentiation'),
      ]
    },
    {
      id:'governance', kind:'check', title:'Corporate Governance',
      help:'How the company is run, disclosed, and held accountable on behalf of minority shareholders.',
      items:[
        checkItem('Board has a genuine independent majority, not just in name'),
        checkItem('Chairman and CEO/MD roles are separate, or a strong lead independent director exists'),
        checkItem('Related-party transactions are disclosed clearly and priced at arm\u2019s length'),
        checkItem('Executive pay is tied to long-term performance, not just EPS or share price optics'),
        checkItem('Auditor is independent, has no history of qualified opinions or restatements'),
        checkItem('Promoter / insider share pledging is low or nil'),
        checkItem('Shareholder rights are protected — no abusive dual-class structure or poison pill'),
        checkItem('Capital allocation history (buybacks, dividends, M&A) has respected minority shareholders'),
      ]
    },
    {
      id:'financials', kind:'check', title:'Financial Health',
      help:'The numbers that back up the story.',
      items:[
        checkItem('Revenue and earnings growth has been consistent over 5+ years'),
        checkItem('Debt/EBITDA and Debt/Equity are comfortable, with Ind AS 116 lease liabilities excluded from the debt figure'),
        checkItem('Free cash flow is positive with healthy conversion from profit'),
        checkItem('Return on equity / return on capital employed exceeds the cost of capital'),
        checkItem('Margins are stable or expanding relative to peers'),
      ]
    },
    {
      id:'valuation', kind:'check', title:'Valuation',
      help:'What you pay versus what you get. Work through multiples, history, peers, and a sanity check on what the price already assumes.',
      items:[
        checkItem('Calculated P/E, P/B, and EV/EBITDA and compared each to the company\u2019s own 5-10 year range'),
        checkItem('Compared valuation multiples against 2-3 closest listed peers, not just the sector average'),
        checkItem('Checked P/E against expected earnings growth (PEG) rather than P/E in isolation'),
        checkItem('Built or sanity-checked a DCF / intrinsic value estimate with conservative assumptions'),
        checkItem('Ran a reverse DCF — the growth and margins the current price implies are realistic, not speculative'),
        checkItem('Dividend yield and payout ratio checked against the company\u2019s own history, if dividends are paid'),
        checkItem('A clear margin of safety exists between current price and estimated intrinsic value'),
        checkItem('Considered what could re-rate or de-rate the multiple (cycle turn, index inclusion, governance overhang)'),
      ]
    },
    {
      id:'redflags', kind:'flag', title:'Risk &amp; Red Flags',
      help:'Checking a box here is a warning sign, not a point in favor — it should pull conviction down.',
      items:[
        flagItem('Frequent auditor changes, CFO turnover, or unexplained resignations'),
        flagItem('Aggressive accounting — revenue recognition shifts, one-off gains inflating reported profit'),
        flagItem('High or rising promoter / insider share pledging'),
        flagItem('Material regulatory action, litigation, or investigation overhang'),
        flagItem('Related-party deals that appear to favor promoters over minority shareholders'),
      ]
    },
  ]
};

/* ---------- Record header ---------- */
(function initRecord(){
  const now = new Date();
  document.getElementById('record-date').textContent =
    now.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  document.getElementById('record-no').textContent =
    now.getFullYear().toString().slice(2) + '-' + Math.floor(1000 + Math.random()*9000);
})();

/* ---------- Rendering ---------- */
const sectionsEl = document.getElementById('sections');

function levelPoints(level){
  return level === 'low' ? 1 : level === 'medium' ? 0.5 : 0;
}

function sectionScore(section){
  const n = section.items.length;
  if(n === 0) return 100;
  if(section.kind === 'check'){
    return Math.round(100 * section.items.filter(i=>i.checked).length / n);
  }
  if(section.kind === 'flag'){
    return Math.round(100 * section.items.filter(i=>!i.checked).length / n);
  }
  if(section.kind === 'force'){
    const pts = section.items.reduce((s,i)=>s + levelPoints(i.level), 0);
    return Math.round(100 * pts / n);
  }
  return 0;
}

function overallScore(){
  const scores = state.sections.map(sectionScore);
  return Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
}

function renderApp(){
  sectionsEl.innerHTML = '';
  state.sections.forEach((section, sIdx) => {
    const page = document.createElement('div');
    page.className = 'section-page';
    page.dataset.sectionId = section.id;

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `
      <div class="section-title">
        <span class="num">§${String(sIdx+1).padStart(2,'0')}</span>
        <h2>${section.title}</h2>
        <span class="tag">${section.kind === 'flag' ? 'lower is better' : section.kind === 'force' ? 'rate intensity' : 'checklist'}</span>
      </div>
      <div class="section-meta">
        <span class="section-score mono" data-score-for="${section.id}">--%</span>
        <span class="chev">▾</span>
      </div>`;
    head.addEventListener('click', ()=> page.classList.toggle('collapsed'));

    const body = document.createElement('div');
    body.className = 'section-body';
    const help = document.createElement('div');
    help.className = 'section-help';
    help.textContent = section.help;
    body.appendChild(help);

    section.items.forEach(item => body.appendChild(renderItemRow(section, item)));

    const addBtn = document.createElement('button');
    addBtn.className = 'add-row';
    addBtn.textContent = '+ add checklist item';
    addBtn.addEventListener('click', () => {
      const label = 'New item — click to edit';
      section.items.push(
        section.kind === 'force' ? forceItem(label) : checkItem(label)
      );
      renderApp();
    });
    body.appendChild(addBtn);

    page.appendChild(head);
    page.appendChild(body);
    sectionsEl.appendChild(page);
  });
  updateScores();
}

function renderItemRow(section, item){
  const row = document.createElement('div');
  row.className = 'item-row' + (section.kind === 'flag' ? ' flag-row' : '');

  let control;
  if(section.kind === 'force'){
    control = document.createElement('select');
    control.className = 'level-select';
    control.dataset.level = item.level;
    ['low','medium','high'].forEach(lv=>{
      const opt = document.createElement('option');
      opt.value = lv; opt.textContent = lv.toUpperCase();
      if(lv === item.level) opt.selected = true;
      control.appendChild(opt);
    });
    control.addEventListener('change', e=>{
      item.level = e.target.value;
      control.dataset.level = item.level;
      updateScores();
    });
  } else {
    control = document.createElement('input');
    control.type = 'checkbox';
    control.className = 'chk';
    control.checked = item.checked;
    control.addEventListener('change', e=>{
      item.checked = e.target.checked;
      updateScores();
    });
  }

  const main = document.createElement('div');
  main.className = 'item-main';

  const labelInput = document.createElement('input');
  labelInput.type = 'text';
  labelInput.className = 'item-label-input';
  labelInput.value = item.label;
  labelInput.addEventListener('input', e=>{ item.label = e.target.value; });

  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.className = 'item-note-input';
  noteInput.placeholder = 'evidence / notes...';
  noteInput.value = item.note || '';
  noteInput.addEventListener('input', e=>{ item.note = e.target.value; });

  main.appendChild(labelInput);
  main.appendChild(noteInput);

  const spacer = document.createElement('div');

  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.title = 'Remove item';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', ()=>{
    section.items = section.items.filter(i=>i.id !== item.id);
    renderApp();
  });

  row.appendChild(control);
  row.appendChild(main);
  row.appendChild(spacer);
  row.appendChild(delBtn);
  return row;
}

/* ---------- Score / stamp updates (no full re-render, keeps focus intact) ---------- */
const barsEl = document.getElementById('bars');
const stampEl = document.getElementById('stamp');
const overallPctEl = document.getElementById('overall-pct');

function barClass(pct){
  return pct >= 70 ? '' : pct >= 40 ? 'warn' : 'danger';
}

function stampSVG(mode){
  const cfg = {
    high:   {color:'#2B5D45', text:'CONVICTION — HIGH', ring:'#2B5D45'},
    medium: {color:'#A8842E', text:'MORE DILIGENCE NEEDED', ring:'#A8842E'},
    low:    {color:'#9C3B30', text:'PASS FOR NOW', ring:'#9C3B30'}
  }[mode];
  return `
  <svg viewBox="0 0 150 150" width="150" height="150">
    <defs>
      <path id="curve" d="M 20,75 A 55,55 0 1 1 130,75" fill="none"/>
    </defs>
    <circle cx="75" cy="75" r="66" fill="none" stroke="${cfg.ring}" stroke-width="2.5"/>
    <circle cx="75" cy="75" r="59" fill="none" stroke="${cfg.ring}" stroke-width="1"/>
    <text font-family="IBM Plex Mono, monospace" font-size="9.5" letter-spacing="2" fill="${cfg.color}" font-weight="700">
      <textPath href="#curve" startOffset="2">${cfg.text}</textPath>
    </text>
    <text x="75" y="88" text-anchor="middle" font-family="Spectral, serif" font-size="26" font-weight="700" fill="${cfg.color}">
      ${mode === 'high' ? 'FILE' : mode === 'medium' ? 'HOLD' : 'PASS'}
    </text>
    <text x="75" y="103" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" letter-spacing="1.5" fill="${cfg.color}">
      RESEARCH DESK
    </text>
  </svg>`;
}

let lastMode = null;
function updateScores(){
  // per-section
  state.sections.forEach(section=>{
    const pct = sectionScore(section);
    const el = document.querySelector(`[data-score-for="${section.id}"]`);
    if(el) el.textContent = pct + '%';
  });

  // overall
  const overall = overallScore();
  overallPctEl.textContent = overall;

  // bars
  barsEl.innerHTML = '';
  state.sections.forEach(section=>{
    const pct = sectionScore(section);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label"><span>${section.title.replace('&amp;','&')}</span><span>${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill ${barClass(pct)}" style="width:${pct}%"></div></div>`;
    barsEl.appendChild(row);
  });

  // stamp
  const mode = overall >= 70 ? 'high' : overall >= 40 ? 'medium' : 'low';
  if(mode !== lastMode){
    stampEl.classList.remove('show');
    stampEl.innerHTML = stampSVG(mode);
    void stampEl.offsetWidth; // reflow to restart animation
    stampEl.classList.add('show');
    lastMode = mode;
  } else {
    stampEl.innerHTML = stampSVG(mode);
    stampEl.classList.add('show');
  }
}

/* ---------- Journal (blog tabs) ---------- */
const tabsbarEl = document.getElementById('journal-tabsbar');
const entryTitleEl = document.getElementById('entry-title');
const entryBodyEl = document.getElementById('entry-body');
const entryWordcountEl = document.getElementById('entry-wordcount');

function activeEntry(){
  return state.journal.entries.find(e => e.id === state.journal.activeId) || state.journal.entries[0];
}

function updateWordcount(){
  const text = (activeEntry().body || '').trim();
  const words = text.length ? text.split(/\s+/).length : 0;
  entryWordcountEl.textContent = words + (words === 1 ? ' word' : ' words');
}

function loadActiveEntryIntoEditor(){
  const entry = activeEntry();
  entryTitleEl.value = entry.title || '';
  entryBodyEl.value = entry.body || '';
  updateWordcount();
}

function renderJournalTabs(){
  tabsbarEl.innerHTML = '';
  state.journal.entries.forEach(entry => {
    const tab = document.createElement('div');
    tab.className = 'j-tab' + (entry.id === state.journal.activeId ? ' active' : '');
    tab.addEventListener('click', () => {
      if(state.journal.activeId !== entry.id){
        state.journal.activeId = entry.id;
        renderJournalTabs();
        loadActiveEntryIntoEditor();
      }
    });

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'tab-name-input';
    nameInput.value = entry.name;
    nameInput.addEventListener('click', e => e.stopPropagation());
    nameInput.addEventListener('input', e => { entry.name = e.target.value; });

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tab-close';
    closeBtn.textContent = '✕';
    closeBtn.title = 'Delete this entry';
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      if(state.journal.entries.length === 1){
        showToast('Keep at least one entry — clear it instead of deleting.');
        return;
      }
      if((entry.title || entry.body) && !confirm(`Delete "${entry.name}"? This can\u2019t be undone unless you\u2019ve exported your ledger.`)) return;
      state.journal.entries = state.journal.entries.filter(e2 => e2.id !== entry.id);
      if(state.journal.activeId === entry.id){
        state.journal.activeId = state.journal.entries[0].id;
      }
      renderJournalTabs();
      loadActiveEntryIntoEditor();
    });

    tab.appendChild(nameInput);
    tab.appendChild(closeBtn);
    tabsbarEl.appendChild(tab);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-tab-btn';
  addBtn.textContent = '+ new entry';
  addBtn.addEventListener('click', () => {
    const n = state.journal.entries.length + 1;
    const newEntry = {id: uid(), name: `Entry ${n}`, title:'', body:''};
    state.journal.entries.push(newEntry);
    state.journal.activeId = newEntry.id;
    renderJournalTabs();
    loadActiveEntryIntoEditor();
  });
  tabsbarEl.appendChild(addBtn);
}

entryTitleEl.addEventListener('input', e => { activeEntry().title = e.target.value; });
entryBodyEl.addEventListener('input', e => { activeEntry().body = e.target.value; updateWordcount(); });
document.getElementById('entry-delete').addEventListener('click', () => {
  document.querySelector(`.j-tab.active .tab-close`)?.click();
});

/* ---------- Cover fields ---------- */
document.getElementById('ticker').addEventListener('input', e=> state.ticker = e.target.value);
document.getElementById('company').addEventListener('input', e=> state.company = e.target.value);
document.getElementById('thesis').addEventListener('input', e=> state.thesis = e.target.value);

/* ---------- Toast ---------- */
const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 2200);
}

/* ---------- Export / Import ---------- */
document.getElementById('btn-export').addEventListener('click', ()=>{
  const payload = JSON.stringify(state, null, 2);
  const blob = new Blob([payload], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const nameBit = (state.ticker || state.company || 'idea').replace(/[^a-z0-9]+/gi,'-').toLowerCase();
  a.href = url;
  a.download = `research-ledger-${nameBit || 'untitled'}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Ledger exported — save this file to resume later.');
});

document.getElementById('btn-import').addEventListener('click', ()=>{
  document.getElementById('import-input').click();
});
document.getElementById('import-input').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const loaded = JSON.parse(reader.result);
      if(!loaded.sections) throw new Error('bad file');
      state.ticker = loaded.ticker || '';
      state.company = loaded.company || '';
      state.thesis = loaded.thesis || '';
      state.sections = loaded.sections;
      state.journal = loaded.journal && loaded.journal.entries && loaded.journal.entries.length
        ? loaded.journal
        : { activeId:'entry-1', entries:[{id:'entry-1', name:'Entry 1', title:'', body:''}] };
      document.getElementById('ticker').value = state.ticker;
      document.getElementById('company').value = state.company;
      document.getElementById('thesis').value = state.thesis;
      renderApp();
      renderJournalTabs();
      loadActiveEntryIntoEditor();
      showToast('Research imported from file.');
    }catch(err){
      showToast('Could not read that file — is it a ledger export?');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ---------- Copy summary ---------- */
document.getElementById('btn-copy').addEventListener('click', ()=>{
  let out = `RESEARCH LEDGER — ${state.company || 'Unnamed company'} (${state.ticker || 'N/A'})\n`;
  out += `Conviction: ${overallScore()}%\n\nTHE IDEA:\n${state.thesis || '(not written yet)'}\n\n`;
  state.sections.forEach(section=>{
    out += `${section.title.replace('&amp;','&')} — ${sectionScore(section)}%\n`;
    section.items.forEach(item=>{
      let mark;
      if(section.kind === 'force') mark = `[${item.level.toUpperCase()}]`;
      else mark = item.checked ? '[x]' : '[ ]';
      out += `  ${mark} ${item.label}${item.note ? '  — ' + item.note : ''}\n`;
    });
    out += '\n';
  });
  const nonEmptyEntries = state.journal.entries.filter(e => e.title || e.body);
  if(nonEmptyEntries.length){
    out += `JOURNAL ENTRIES:\n`;
    nonEmptyEntries.forEach(e => {
      out += `--- ${e.name}${e.title ? ': ' + e.title : ''} ---\n${e.body || ''}\n\n`;
    });
  }
  navigator.clipboard.writeText(out).then(()=> showToast('Summary copied to clipboard.'))
    .catch(()=> showToast('Could not copy — clipboard access blocked.'));
});

/* ---------- Print ---------- */
document.getElementById('btn-print').addEventListener('click', ()=> window.print());

/* ---------- Reset ---------- */
document.getElementById('btn-reset').addEventListener('click', ()=>{
  if(!confirm('Clear all checkmarks, ratings and notes on this ledger? Export first if you want a copy.')) return;
  state.sections.forEach(section=>{
    section.items.forEach(item=>{
      if(section.kind === 'force') item.level = 'medium';
      else item.checked = false;
      item.note = '';
    });
  });
  renderApp();
  showToast('Ledger cleared.');
});

/* ---------- Init ---------- */
renderApp();
renderJournalTabs();
loadActiveEntryIntoEditor();
</script>
</body>
</html>
